<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メルカリ出品サポート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 24px;
      color: #e8526a;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 13px;
      font-weight: bold;
      color: #e8526a;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 2px solid #f5e6e9;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }

    label .required {
      color: #e8526a;
      margin-left: 4px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #e8526a;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #e8526a;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #d44460; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .btn-reset {
      width: 100%;
      padding: 12px;
      background: white;
      color: #e8526a;
      border: 2px solid #e8526a;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
    }

    .btn-reset:hover { background: #fdf0f2; }

    #result-card { display: none; }

    .result-block {
      margin-bottom: 20px;
    }

    .result-label {
      font-size: 13px;
      font-weight: bold;
      color: #e8526a;
      margin-bottom: 6px;
    }

    .result-text {
      background: #fdf5f6;
      border: 1px solid #f0d5da;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .copy-btn {
      margin-top: 6px;
      padding: 6px 14px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .copy-btn:hover { background: #eee; }

    #loading {
      display: none;
      text-align: center;
      color: #999;
      padding: 20px;
      font-size: 14px;
    }

    /* サイズボタン */
    .size-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .size-btn {
      padding: 8px 14px;
      border: 2px solid #ddd;
      border-radius: 20px;
      background: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .size-btn.active {
      border-color: #e8526a;
      background: #e8526a;
      color: white;
      font-weight: bold;
    }

    /* ドラムロール */
    .drum-row {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .drum-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }
    .drum-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .drum-unit {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .drum-picker {
      width: 100%;
      height: 150px;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      border: 1px solid #ddd;
      border-radius: 8px;
      position: relative;
      scrollbar-width: none;
    }
    .drum-picker::-webkit-scrollbar { display: none; }
    .drum-picker::before,
    .drum-picker::after {
      content: '';
      display: block;
      height: 60px;
    }
    .drum-item {
      height: 30px;
      line-height: 30px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      scroll-snap-align: center;
      color: #ccc;
      transition: color 0.15s;
      cursor: pointer;
    }
    .drum-item.selected { color: #e8526a; }
    .drum-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.85) 0%,
        rgba(255,255,255,0) 35%,
        rgba(255,255,255,0) 65%,
        rgba(255,255,255,0.85) 100%
      );
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛍️ メルカリ出品サポート</h1>

    <div class="card" id="form-card">
      <div class="section-title">必須情報</div>

      <div class="form-group">
        <label>ブランド名 <span class="required">*</span></label>
        <input type="text" id="brand" placeholder="例：ユニクロ、ZARA">
      </div>
      <div class="form-group">
        <label>アイテム <span class="required">*</span></label>
        <input type="text" id="item" placeholder="例：Tシャツ、パンツ、ニット">
      </div>
      <div class="form-group">
        <label>サイズ表記 <span class="required">*</span></label>
        <div class="size-buttons">
          <button type="button" class="size-btn" onclick="selectSize(this)">XS</button>
          <button type="button" class="size-btn" onclick="selectSize(this)">S</button>
          <button type="button" class="size-btn" onclick="selectSize(this)">M</button>
          <button type="button" class="size-btn" onclick="selectSize(this)">L</button>
          <button type="button" class="size-btn" onclick="selectSize(this)">XL</button>
          <button type="button" class="size-btn" onclick="selectSize(this)">XXL</button>
          <button type="button" class="size-btn" onclick="selectSize(this)">FREE</button>
          <button type="button" class="size-btn" onclick="selectSize(this)">その他</button>
        </div>
        <input type="text" id="size-other" placeholder="サイズを入力（例：38、160cm）"
               style="display:none; margin-top:8px;">
        <input type="hidden" id="size">
      </div>
      <div class="form-group">
        <label>実寸 <span class="required">*</span></label>
        <div class="drum-row">
          <div class="drum-wrap">
            <div class="drum-label">肩幅</div>
            <div class="drum-picker" id="drum-kata"></div>
            <div class="drum-unit">cm</div>
          </div>
          <div class="drum-wrap">
            <div class="drum-label">身幅</div>
            <div class="drum-picker" id="drum-mi"></div>
            <div class="drum-unit">cm</div>
          </div>
          <div class="drum-wrap">
            <div class="drum-label">着丈</div>
            <div class="drum-picker" id="drum-ki"></div>
            <div class="drum-unit">cm</div>
          </div>
        </div>
        <div class="drum-row" style="margin-top:10px;">
          <div class="drum-wrap">
            <div class="drum-label">袖丈</div>
            <div class="drum-picker" id="drum-sode"></div>
            <div class="drum-unit">cm</div>
          </div>
          <div class="drum-wrap">
            <div class="drum-label">ウエスト</div>
            <div class="drum-picker" id="drum-waist"></div>
            <div class="drum-unit">cm</div>
          </div>
          <div class="drum-wrap">
            <div class="drum-label">ヒップ</div>
            <div class="drum-picker" id="drum-hip"></div>
            <div class="drum-unit">cm</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>色 <span class="required">*</span></label>
        <input type="text" id="color" placeholder="例：ネイビー、ホワイト">
      </div>
      <div class="form-group">
        <label>状態 <span class="required">*</span></label>
        <div class="size-buttons">
          <button type="button" class="size-btn" onclick="selectCondition(this)">未使用・新品</button>
          <button type="button" class="size-btn" onclick="selectCondition(this)">ほぼ未使用</button>
          <button type="button" class="size-btn" onclick="selectCondition(this)">目立った傷なし</button>
          <button type="button" class="size-btn" onclick="selectCondition(this)">やや傷・汚れあり</button>
          <button type="button" class="size-btn" onclick="selectCondition(this)">傷・汚れあり</button>
        </div>
        <input type="hidden" id="condition">
      </div>

      <div class="section-title" style="margin-top:20px;">任意情報（あれば入力）</div>

      <div class="form-group">
        <label>素材（複数選択OK）</label>
        <div class="size-buttons" id="material-buttons">
          <button type="button" class="size-btn" onclick="toggleMaterial(this)">綿</button>
          <button type="button" class="size-btn" onclick="toggleMaterial(this)">ポリエステル</button>
          <button type="button" class="size-btn" onclick="toggleMaterial(this)">ナイロン</button>
          <button type="button" class="size-btn" onclick="toggleMaterial(this)">ウール</button>
          <button type="button" class="size-btn" onclick="toggleMaterial(this)">シルク</button>
          <button type="button" class="size-btn" onclick="toggleMaterial(this)">リネン</button>
          <button type="button" class="size-btn" onclick="toggleMaterial(this)">レーヨン</button>
          <button type="button" class="size-btn" onclick="toggleMaterial(this)">その他</button>
        </div>
        <input type="text" id="material-other" placeholder="素材を入力" style="display:none; margin-top:8px;">
        <input type="hidden" id="material">
      </div>

      <button class="btn" onclick="generate()">✨ 説明文を生成する</button>
    </div>

    <div id="loading">生成中です。少々お待ちください...</div>

    <div class="card" id="result-card">
      <div class="section-title">生成結果</div>

      <div class="result-block">
        <div class="result-label">📌 タイトル</div>
        <div class="result-text" id="out-title"></div>
        <button class="copy-btn" onclick="copy('out-title')">コピー</button>
      </div>

      <div class="result-block">
        <div class="result-label">📝 説明文</div>
        <div class="result-text" id="out-desc"></div>
        <button class="copy-btn" onclick="copy('out-desc')">コピー</button>
      </div>

      <div class="result-block">
        <div class="result-label">🔖 ハッシュタグ</div>
        <div class="result-text" id="out-tags"></div>
        <button class="copy-btn" onclick="copy('out-tags')">コピー</button>
      </div>

      <button class="btn-reset" onclick="reset()">🔄 もう一度入力する</button>
    </div>
  </div>

  <script>
    // ── 状態選択 ──
    function selectCondition(btn) {
      document.querySelectorAll('#form-card .size-btn[onclick="selectCondition(this)"]')
        .forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('condition').value = btn.textContent;
    }

    // ── 素材選択（複数OK） ──
    function toggleMaterial(btn) {
      if (btn.textContent === 'その他') {
        btn.classList.toggle('active');
        const other = document.getElementById('material-other');
        other.style.display = btn.classList.contains('active') ? 'block' : 'none';
      } else {
        btn.classList.toggle('active');
      }
      updateMaterialValue();
    }
    function updateMaterialValue() {
      const selected = [...document.querySelectorAll('#material-buttons .size-btn.active')]
        .filter(b => b.textContent !== 'その他')
        .map(b => b.textContent);
      const other = document.getElementById('material-other').value.trim();
      if (other) selected.push(other);
      document.getElementById('material').value = selected.join('・');
    }
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('material-other').addEventListener('input', updateMaterialValue);
    });

    // ── サイズ選択 ──
    function selectSize(btn) {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const val = btn.textContent;
      if (val === 'その他') {
        document.getElementById('size-other').style.display = 'block';
        document.getElementById('size').value = '';
      } else {
        document.getElementById('size-other').style.display = 'none';
        document.getElementById('size').value = val;
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('size-other').addEventListener('input', function() {
        document.getElementById('size').value = this.value;
      });
    });

    // ── ドラムロール初期化 ──
    function initDrum(id, min, max, defaultVal) {
      const el = document.getElementById(id);
      for (let i = min; i <= max; i++) {
        const div = document.createElement('div');
        div.className = 'drum-item';
        div.textContent = i;
        el.appendChild(div);
      }
      const overlay = document.createElement('div');
      overlay.className = 'drum-overlay';
      el.parentElement.appendChild(overlay);

      // 初期値にスクロール
      const itemH = 30;
      el.scrollTop = (defaultVal - min) * itemH;
      updateSelected(el, min);

      el.addEventListener('scroll', () => updateSelected(el, min), { passive: true });
    }

    function updateSelected(el, min) {
      const itemH = 30;
      const idx = Math.round(el.scrollTop / itemH);
      el.querySelectorAll('.drum-item').forEach((item, i) => {
        item.classList.toggle('selected', i === idx);
      });
    }

    function getDrumValue(id, min) {
      const el = document.getElementById(id);
      return min + Math.round(el.scrollTop / 30);
    }

    window.addEventListener('DOMContentLoaded', () => {
      initDrum('drum-kata',  30, 65, 43);
      initDrum('drum-mi',   35, 75, 50);
      initDrum('drum-ki',   40, 90, 65);
      initDrum('drum-sode', 50, 70, 58);
      initDrum('drum-waist',60,100, 72);
      initDrum('drum-hip',  70,110, 88);
    });

    // ── フォーム送信 ──
    async function generate() {
      const required = ['brand', 'item', 'size', 'color', 'condition'];
      for (const id of required) {
        if (!document.getElementById(id).value.trim()) {
          alert('※ 必須項目をすべて入力してください。');
          document.getElementById(id).focus();
          return;
        }
      }

      const kata  = getDrumValue('drum-kata',  30);
      const mi    = getDrumValue('drum-mi',   35);
      const ki    = getDrumValue('drum-ki',   40);
      const sode  = getDrumValue('drum-sode', 50);
      const waist = getDrumValue('drum-waist',60);
      const hip   = getDrumValue('drum-hip',  70);
      const measurements = `肩幅${kata} 身幅${mi} 着丈${ki} 袖丈${sode} ウエスト${waist} ヒップ${hip}`;

      const info = {
        brand:        document.getElementById('brand').value,
        item:         document.getElementById('item').value,
        size:         document.getElementById('size').value,
        measurements: measurements,
        color:        document.getElementById('color').value,
        condition:    document.getElementById('condition').value,
        material:     document.getElementById('material').value,
      };

      document.querySelector('.btn').disabled = true;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result-card').style.display = 'none';

      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(info)
      });
      const data = await res.json();

      document.getElementById('loading').style.display = 'none';
      document.querySelector('.btn').disabled = false;

      const text = data.result;
      document.getElementById('out-title').textContent = extract(text, 'タイトル');
      document.getElementById('out-desc').textContent = extract(text, '説明文');
      document.getElementById('out-tags').textContent = extract(text, 'ハッシュタグ');

      document.getElementById('result-card').style.display = 'block';
      document.getElementById('result-card').scrollIntoView({ behavior: 'smooth' });
    }

    function extract(text, section) {
      const regex = new RegExp(`【${section}】\\s*([\\s\\S]*?)(?=\\n【|$)`);
      const match = text.match(regex);
      if (!match) return '';
      return match[1].replace(/^\(.*?\)\s*/s, '').trim();
    }

    function copy(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.textContent = 'コピーしました！';
        setTimeout(() => btn.textContent = 'コピー', 2000);
      });
    }

    function reset() {
      document.getElementById('result-card').style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
